{% extends "base.html" %}
{% block title %}Settings{% endblock %}
{% block content %}
<h1>Settings</h1>

<section class="card">
  <h2>Retention</h2>
  <form method="post">
    <label>Retention (days for local .eml archive)
      <input type="number" name="retention_days" min="1" value="{{ settings.get('retention_days', '30') }}">
    </label>
    <label>Default Gmail label applied at insert (blank = none)
      <input name="default_label" value="{{ settings.get('default_label', '') }}">
    </label>
    <button type="submit" class="btn">Save</button>
  </form>
</section>

<section class="card">
  <h2>Change web UI password</h2>
  {% if pw_error %}<p class="error">{{ pw_error }}</p>{% endif %}
  <form method="post" action="{{ url_prefix }}/settings/password">
    <label>Current password<input type="password" name="current" required></label>
    <label>New password<input type="password" name="new" required minlength="8"></label>
    <label>Confirm<input type="password" name="confirm" required minlength="8"></label>
    <button type="submit" class="btn">Change password</button>
  </form>
</section>

<section class="card">
  <h2>Maintenance</h2>
  <form method="post" action="{{ url_prefix }}/actions/sweep" style="display:inline">
    <button class="btn" type="submit">Run retention sweep now</button>
  </form>
  <form method="post" action="{{ url_prefix }}/actions/reconcile" style="display:inline">
    <button class="btn" type="submit">Reconcile workers</button>
  </form>
</section>
{% endblock %}
