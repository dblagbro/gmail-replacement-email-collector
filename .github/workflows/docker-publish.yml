name: Docker publish
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract version
        id: ver
        run: |
          TAG=${GITHUB_REF_NAME#v}
          MAJOR_MINOR=$(echo "$TAG" | cut -d. -f1-2)
          echo "tag=$TAG"             >> $GITHUB_OUTPUT
          echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            dblagbro/gmail-replacement-email-collector:latest
            dblagbro/gmail-replacement-email-collector:${{ steps.ver.outputs.tag }}
            dblagbro/gmail-replacement-email-collector:${{ steps.ver.outputs.major_minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
