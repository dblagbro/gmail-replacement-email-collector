name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest ruff
      - name: Ruff lint
        run: ruff check app/ || true   # advisory until we add ruff config
      - name: Pytest
        env:
          EMAIL_FORWARDER_DATA_DIR: /tmp/ef-test
        run: pytest tests/ -v || true   # advisory until tests/ is fleshed out
